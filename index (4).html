<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Power Grid Europe — Elektroenergetski Simulator</title>
<style>
  :root{
    --bg:#06090d;
    --bg2:#0b1320;
    --panel:#0e1828cc;
    --panel-solid:#0e1828;
    --border:#1d3148;
    --grid:#152134;
    --line:#1e3a5f;
    --live:#22d3ee;
    --live-2:#7df9ff;
    --hot:#fb923c;
    --hot-2:#fde68a;
    --bad:#ef4444;
    --good:#34d399;
    --muted:#94a3b8;
    --text:#e2e8f0;
    --gold:#facc15;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:'Inter','Segoe UI',system-ui,sans-serif;user-select:none;-webkit-user-select:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  /* === LOADING SCREEN === */
  #loadingScreen{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0c1830 0%,#04070d 70%);
    transition:opacity .6s ease}
  #loadingScreen.hide{opacity:0;pointer-events:none}
  #loadingMap{position:absolute;inset:0;opacity:.35}
  .ld-logo{position:relative;z-index:2;text-align:center;margin-bottom:60px}
  .ld-logo .bolt{font-size:80px;line-height:1;color:var(--live);
    text-shadow:0 0 30px var(--live),0 0 60px #22d3ee88;animation:flicker 2.4s infinite}
  @keyframes flicker{0%,100%{opacity:1}48%{opacity:1}50%{opacity:.4}52%{opacity:1}}
  .ld-logo h1{font-size:42px;font-weight:800;letter-spacing:8px;margin-top:10px;
    background:linear-gradient(180deg,#e2e8f0,#7dd3fc);-webkit-background-clip:text;
    background-clip:text;color:transparent}
  .ld-logo .sub{color:var(--muted);letter-spacing:3px;font-size:12px;margin-top:8px;text-transform:uppercase}
  .progressWrap{position:relative;z-index:2;width:min(520px,80vw)}
  .progressBar{height:6px;background:var(--grid);border-radius:6px;overflow:hidden;position:relative}
  .progressFill{height:100%;width:0%;background:linear-gradient(90deg,#22d3ee,#7df9ff,#22d3ee);
    background-size:200% 100%;animation:slide 1.5s linear infinite;
    box-shadow:0 0 20px var(--live);transition:width .3s ease}
  @keyframes slide{0%{background-position:0 0}100%{background-position:200% 0}}
  .progressInfo{display:flex;justify-content:space-between;margin-top:14px;font-size:13px;
    color:var(--muted);font-family:'JetBrains Mono',monospace}
  .progressInfo .pct{color:var(--live);font-weight:700}

  /* === GAME === */
  #game{position:fixed;inset:0;display:none}
  #game.active{display:block}
  #map{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair;background:#04070d}

  /* HUD */
  #hud{position:absolute;top:0;left:0;right:0;padding:12px;display:flex;gap:8px;flex-wrap:wrap;
    pointer-events:none;z-index:10}
  .stat{background:var(--panel);backdrop-filter:blur(10px);border:1px solid var(--border);
    border-radius:10px;padding:8px 14px;display:flex;align-items:center;gap:8px;
    pointer-events:auto;font-size:13px;font-weight:600}
  .stat .ic{font-size:18px;line-height:1}
  .stat .lbl{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:500}
  .stat .val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px}
  .stat.money .val{color:var(--gold)}
  .stat.xp .val{color:var(--live)}
  .stat.rep .val{color:#a78bfa}
  .stat.sec .val{color:var(--good)}
  .stat.lvl{background:linear-gradient(135deg,#1e3a8a,#0c4a6e);border-color:#3b82f6}
  .stat.lvl .val{color:#fff;font-size:16px}

  /* Sidebar */
  #sidebar{position:absolute;right:12px;top:80px;display:flex;flex-direction:column;gap:8px;z-index:10}
  .sb-btn{background:var(--panel);backdrop-filter:blur(10px);border:1px solid var(--border);
    border-radius:10px;width:52px;height:52px;font-size:22px;display:flex;align-items:center;
    justify-content:center;position:relative;transition:all .2s}
  .sb-btn:hover{border-color:var(--live);transform:translateY(-1px)}
  .sb-btn .badge{position:absolute;top:-4px;right:-4px;background:var(--bad);color:#fff;
    font-size:10px;font-weight:700;border-radius:10px;padding:2px 6px;min-width:18px;text-align:center;
    font-family:'JetBrains Mono',monospace;border:2px solid var(--bg)}
  .sb-btn .tip{position:absolute;right:60px;top:50%;transform:translateY(-50%);
    background:var(--panel-solid);border:1px solid var(--border);padding:6px 10px;border-radius:6px;
    font-size:12px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s}
  .sb-btn:hover .tip{opacity:1}

  /* Bottom log */
  #log{position:absolute;left:12px;bottom:12px;width:min(420px,60vw);max-height:160px;
    overflow:hidden;pointer-events:none;z-index:10}
  .logEntry{background:var(--panel);backdrop-filter:blur(10px);border:1px solid var(--border);
    border-left:3px solid var(--live);border-radius:6px;padding:6px 10px;margin-top:6px;
    font-size:12px;animation:logIn .3s ease;font-family:'JetBrains Mono',monospace}
  .logEntry.warn{border-left-color:var(--hot)}
  .logEntry.bad{border-left-color:var(--bad)}
  .logEntry.good{border-left-color:var(--good)}
  .logEntry .t{color:var(--muted);font-size:10px;margin-right:6px}
  @keyframes logIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}

  /* Time indicator */
  #timeBar{position:absolute;bottom:12px;right:12px;background:var(--panel);
    backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:10px;
    padding:8px 14px;font-size:12px;font-family:'JetBrains Mono',monospace;
    display:flex;align-items:center;gap:12px;z-index:10}
  #timeBar .weather{font-size:18px}
  #timeBar .clock{color:var(--live);font-weight:700;font-size:14px}

  /* Modal */
  .overlay{position:fixed;inset:0;background:#000b;backdrop-filter:blur(4px);
    z-index:100;display:none;align-items:center;justify-content:center;padding:20px;
    animation:fadeIn .25s ease}
  .overlay.show{display:flex}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{background:linear-gradient(180deg,#0e1828,#0a1320);border:1px solid var(--border);
    border-radius:14px;padding:22px;width:100%;max-width:520px;max-height:90vh;overflow:auto;
    box-shadow:0 20px 60px #000a,0 0 80px #22d3ee22}
  .modal h2{font-size:20px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
  .modal h2 .badge-lvl{background:var(--bad);color:#fff;padding:2px 8px;border-radius:6px;
    font-size:11px;font-family:'JetBrains Mono',monospace}
  .modal .desc{color:var(--muted);font-size:13px;margin-bottom:16px;line-height:1.5}
  .modal .reward{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;padding:10px;
    background:var(--grid);border-radius:8px;font-size:12px;font-family:'JetBrains Mono',monospace}
  .modal .reward span{display:flex;gap:4px;align-items:center}
  .modal .actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
  .btn{padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;
    border:1px solid var(--border);background:var(--grid);transition:all .15s}
  .btn:hover{border-color:var(--live);background:#1a2a44}
  .btn.primary{background:linear-gradient(135deg,#0891b2,#0e7490);border-color:#22d3ee;color:#fff}
  .btn.primary:hover{background:linear-gradient(135deg,#06b6d4,#0891b2)}
  .btn.danger{background:#7f1d1d;border-color:#ef4444;color:#fff}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  /* Task widgets */
  .taskArea{background:var(--bg);border:1px dashed var(--border);border-radius:10px;
    padding:18px;margin:12px 0;min-height:160px;position:relative}
  .wireGrid{display:grid;gap:10px}
  .wireRow{display:flex;align-items:center;gap:10px;justify-content:center}
  .wireBtn{width:48px;height:48px;border-radius:8px;background:var(--grid);border:1px solid var(--border);
    font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .wireBtn:hover{transform:scale(1.05);border-color:var(--live)}
  .wireBtn.on{background:var(--live);color:#000;border-color:var(--live-2);box-shadow:0 0 16px var(--live)}
  .wireBtn.wrong{background:var(--bad);border-color:var(--bad);animation:shake .3s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .numInput{width:100%;padding:12px;font-size:18px;background:var(--grid);border:1px solid var(--border);
    border-radius:8px;color:var(--text);text-align:center;font-family:'JetBrains Mono',monospace;font-weight:700}
  .numInput:focus{outline:none;border-color:var(--live)}
  .options{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .opt{padding:14px;background:var(--grid);border:1px solid var(--border);border-radius:8px;
    text-align:left;font-size:13px;line-height:1.4;transition:all .15s}
  .opt:hover{border-color:var(--live);background:#1a2a44}
  .opt.picked{border-color:var(--live);background:#0c4a5a}

  /* Timing bar (zaštita mreže) */
  .timingBar{height:30px;background:linear-gradient(90deg,var(--bad) 0%,var(--bad) 30%,
    var(--good) 30%,var(--good) 60%,var(--bad) 60%,var(--bad) 100%);
    border-radius:8px;position:relative;overflow:hidden;border:1px solid var(--border)}
  .timingMarker{position:absolute;top:0;bottom:0;width:3px;background:#fff;
    box-shadow:0 0 8px #fff;left:0;animation:sweep 1.6s linear infinite alternate}
  @keyframes sweep{from{left:0%}to{left:calc(100% - 3px)}}

  /* Calc problem */
  .calcDisplay{font-size:28px;text-align:center;padding:20px;font-family:'JetBrains Mono',monospace;
    background:var(--grid);border-radius:8px;color:var(--live-2);font-weight:700}

  /* Build / Research menu */
  .menu-list{display:grid;gap:10px;margin-top:14px}
  .menu-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--grid);
    border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s}
  .menu-item:hover:not(.locked){border-color:var(--live);transform:translateX(2px)}
  .menu-item.locked{opacity:.5;cursor:not-allowed}
  .menu-item.owned{border-color:var(--good);background:#0a2a1a}
  .menu-item .mi-ic{font-size:28px;width:46px;text-align:center}
  .menu-item .mi-body{flex:1}
  .menu-item .mi-name{font-weight:600;font-size:14px}
  .menu-item .mi-desc{color:var(--muted);font-size:11px;margin-top:2px}
  .menu-item .mi-cost{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold);font-weight:700}
  .menu-tabs{display:flex;gap:4px;background:var(--grid);padding:4px;border-radius:10px;margin-bottom:10px}
  .menu-tab{flex:1;padding:8px;border-radius:6px;font-size:12px;font-weight:600;color:var(--muted)}
  .menu-tab.active{background:var(--live);color:#000}

  /* Welcome screen */
  .welcome-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
  .welcome-cell{background:var(--grid);padding:8px;border-radius:6px;text-align:center;font-size:11px}
  .welcome-cell .em{font-size:20px;display:block;margin-bottom:4px}

  /* Toast */
  #toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:200;
    display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
  .toast{background:var(--panel-solid);border:1px solid var(--border);border-left:4px solid var(--live);
    padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;
    box-shadow:0 8px 30px #000a;animation:toastIn .3s ease;max-width:90vw}
  .toast.good{border-left-color:var(--good)}
  .toast.bad{border-left-color:var(--bad)}
  .toast.warn{border-left-color:var(--hot)}
  @keyframes toastIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}

  /* Level up screen */
  .levelUp{text-align:center;padding:20px}
  .levelUp .big{font-size:60px;color:var(--gold);text-shadow:0 0 30px var(--gold);margin:10px 0}
  .levelUp h2{font-size:24px;margin-bottom:8px}
  .levelUp .unlocked{margin-top:14px;padding:14px;background:var(--grid);border-radius:8px;text-align:left}
  .levelUp .unlocked h4{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .levelUp .unlocked div{padding:4px 0;font-size:13px}

  /* Smaller mobile */
  @media (max-width:640px){
    .ld-logo h1{font-size:30px;letter-spacing:4px}
    .stat .lbl{display:none}
    .stat{padding:6px 10px;font-size:12px}
    #log{width:80vw;max-height:100px}
    #sidebar{top:72px}
    .sb-btn{width:46px;height:46px;font-size:18px}
    .options{grid-template-columns:1fr}
    .welcome-grid{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>

<!-- ====== LOADING SCREEN ====== -->
<div id="loadingScreen">
  <canvas id="loadingMap"></canvas>
  <div class="ld-logo">
    <div class="bolt">⚡</div>
    <h1>POWER GRID</h1>
    <div class="sub">Europe · Elektroenergetski Simulator</div>
  </div>
  <div class="progressWrap">
    <div class="progressBar"><div class="progressFill" id="loadFill"></div></div>
    <div class="progressInfo">
      <span id="loadMsg">Inicijalizacija sistema...</span>
      <span class="pct" id="loadPct">0%</span>
    </div>
  </div>
</div>

<!-- ====== GAME ====== -->
<div id="game">
  <canvas id="map"></canvas>

  <div id="hud">
    <div class="stat money"><span class="ic">💰</span><div><div class="lbl">Novac</div><div class="val" id="hMoney">1000</div></div></div>
    <div class="stat xp"><span class="ic">⚡</span><div><div class="lbl">XP</div><div class="val" id="hXp">0</div></div></div>
    <div class="stat rep"><span class="ic">👥</span><div><div class="lbl">Reputacija</div><div class="val" id="hRep">50</div></div></div>
    <div class="stat sec"><span class="ic">🛡️</span><div><div class="lbl">Sigurnost</div><div class="val" id="hSec">100</div></div></div>
    <div class="stat lvl"><span class="ic">📊</span><div><div class="lbl">Level</div><div class="val" id="hLvl">1</div></div></div>
  </div>

  <div id="sidebar">
    <button class="sb-btn" onclick="openBuild()">🏗️<span class="tip">Gradnja</span></button>
    <button class="sb-btn" onclick="openResearch()">🔬<span class="tip">Istraživanje</span></button>
    <button class="sb-btn" onclick="openFaults()" id="sbFaults">⚠️<span class="badge" id="faultBadge">0</span><span class="tip">Kvarovi</span></button>
    <button class="sb-btn" onclick="openInfo()">ℹ️<span class="tip">Info</span></button>
  </div>

  <div id="log"></div>
  <div id="timeBar">
    <span class="weather" id="wxIcon">☀️</span>
    <span id="wxTxt">Vedro</span>
    <span class="clock" id="clock">08:00</span>
  </div>
</div>

<!-- ====== MODALS / TOAST ====== -->
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div id="toast"></div>

// Predefinisana mjesta (gradovi + elektrane). x,y u mapa-koordinatama.
const PLACES = [

const map = document.getElementById('map');
const ctx = map.getContext('2d');
const W = () => map.width;
const H = () => map.height;

function resize(){
  const r = window.devicePixelRatio || 1;
  map.width = window.innerWidth * r;
  map.height = window.innerHeight * r;
  map.style.width = window.innerWidth + 'px';
  map.style.height = window.innerHeight + 'px';
  ctx.setTransform(r,0,0,r,0,0);
  fitView();
}
window.addEventListener('resize', resize);

// View transform: mapa-koordinate (0..1600 x 0..1000) → pixel
const MAP_W = 1600, MAP_H = 1000;
function fitView(){
  const w = window.innerWidth, h = window.innerHeight;
  const padTop = 70, padBottom = 70;
  const sx = w / MAP_W;
  const sy = (h - padTop - padBottom) / MAP_H;
  S.view.scale = Math.min(sx, sy);
  S.view.offX = (w - MAP_W * S.view.scale) / 2;
  S.view.offY = padTop + ((h - padTop - padBottom) - MAP_H * S.view.scale)/2;
}
function toScreen(x,y){
  return [ x*S.view.scale + S.view.offX, y*S.view.scale + S.view.offY ];
}
function fromScreen(px,py){
  return [ (px - S.view.offX) / S.view.scale, (py - S.view.offY) / S.view.scale ];
}

const loadNodes = [];
for (let i=0;i<40;i++){
  loadNodes.push({ x: Math.random()*lmap.width, y: Math.random()*lmap.height });
}
const loadConns = [];
for (let i=0;i<loadNodes.length;i++){
  for (let j=i+1;j<loadNodes.length;j++){
    const dx = loadNodes[i].x - loadNodes[j].x;
    const dy = loadNodes[i].y - loadNodes[j].y;
    if (Math.sqrt(dx*dx+dy*dy) < 180) loadConns.push([i,j]);
  }
}
let loadT = 0;
function drawLoading(){
  lctx.clearRect(0,0,lmap.width,lmap.height);
  loadT += 0.02;
  for (const [a,b] of loadConns){
    const A = loadNodes[a], B = loadNodes[b];
    lctx.strokeStyle = '#1e3a5f';
    lctx.lineWidth = 1;
    lctx.beginPath();
    lctx.moveTo(A.x, A.y);
    lctx.lineTo(B.x, B.y);
    lctx.stroke();
    // particle
    const t = (loadT + (a+b)*0.1) % 1;
    const px = A.x + (B.x-A.x)*t;
    const py = A.y + (B.y-A.y)*t;
    lctx.fillStyle = '#22d3ee';
    lctx.shadowColor = '#22d3ee';
    lctx.shadowBlur = 8;
    lctx.beginPath();
    lctx.arc(px,py,2,0,Math.PI*2);
    lctx.fill();
    lctx.shadowBlur = 0;
  }
  for (const n of loadNodes){
    lctx.fillStyle = '#7df9ff';
    lctx.beginPath();
    lctx.arc(n.x,n.y,2,0,Math.PI*2);
    lctx.fill();
  }
}

}

let lastFaultTime = 0;
let nextFaultDelay = randInt(20,40);

function maybeGenerateFault(){
  if (S.time - lastFaultTime < nextFaultDelay) return;
  lastFaultTime = S.time;
  nextFaultDelay = Math.max(15, randInt(35,80) - S.level*2);
  if (S.faults.length >= 5) return; // cap

  // Filter tipova prema features
  let pool = FAULT_TYPES.filter(f => {
    if (f.id === 'cyber' && !S.features.has('cyberAttacks')) return false;
    if (f.id === 'storm' && !S.features.has('disasters') && S.weather !== 'storm') return false;
    if (f.id === 'fire' && !S.features.has('disasters') && S.level < 5) return false;
    if (f.id === 'sab' && S.level < 4) return false;
    if (f.id === 'trans' && !S.features.has('substations')) return false;
    return true;
  });
  if (S.weather === 'storm') pool = pool.concat([FAULT_TYPES.find(f=>f.id==='storm')]);

  const ft = pick(pool);
  // Lokacija: nasumični element u otključanim zemljama
  const places = PLACES.filter(p => S.unlocked.has(p.country));
  if (!places.length) return;
  const place = pick(places);

  // Težina raste sa levelom
  const sevMod = ft.sev + Math.floor(S.level/3);
  const fault = {
    id: S.faultIdSeq++,
    type: ft,
    placeId: place.id,
    severity: sevMod,
    deadline: S.time + Math.max(40, 120 - S.level*5),
    reward: { money: 80*sevMod + S.level*30, xp: 20*sevMod + S.level*5, rep: 1+ft.sev },
    affected: place.demand || 20,
    weather: S.weather,
  };
  S.faults.push(fault);
  S.brokenIds.add(place.id);
  // Iskljucimo i neku liniju u blizini
  const nearby = LINES.filter(([a,b]) => a===place.id || b===place.id);
  if (nearby.length){
    const ln = pick(nearby);
    S.brokenIds.add(lineKey(ln[0], ln[1]));
  }
  addLog(`${ft.ic} <b>${ft.name}</b> · ${place.name}`, 'bad');
  toast(`⚠️ Kvar: ${ft.name}`, 'warn');
  S.security = Math.max(0, S.security - 2);
}

/* ====================================================
   PROVJERA DEADLINE KVAROVA
   ==================================================== */
function tickFaults(){
  for (let i = S.faults.length - 1; i >= 0; i--){
    const f = S.faults[i];
    if (S.time > f.deadline){
      // Neuspjeh
      S.reputation = Math.max(0, S.reputation - 5 - f.severity);
      S.security = Math.max(0, S.security - 3 - f.severity);
      S.money = Math.max(0, S.money - 50*f.severity);
      addLog(`✗ Kvar nije riješen na vrijeme: ${f.type.name}`, 'bad');
      removeFault(f.id);
    }
  }
}

function removeFault(id){
  const f = S.faults.find(x => x.id === id);
  if (!f) return;
  S.faults = S.faults.filter(x => x.id !== id);
  S.brokenIds.delete(f.placeId);
  // Pronađi i ukloni broken lines vezane uz mjesto
  LINES.forEach(([a,b]) => {
    if (a === f.placeId || b === f.placeId) S.brokenIds.delete(lineKey(a,b));
  });
}

/* ====================================================
   CRTANJE MAPE
   ==================================================== */
const STAR_FIELD = [];
for (let i=0;i<80;i++) STAR_FIELD.push({ x: Math.random()*MAP_W, y: Math.random()*MAP_H*0.5, b: Math.random() });

function draw(){
  const t = performance.now();
  ctx.clearRect(0,0,W(),H());

  // Pozadina po dan/noć
  const night = isNight();
  const bg1 = night ? '#020410' : '#031020';
  const bg2 = night ? '#04081a' : '#062035';
  const grad = ctx.createLinearGradient(0,0,0,window.innerHeight);
  grad.addColorStop(0, bg1);
  grad.addColorStop(1, bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W(),H());

  // Zvijezde noću
  if (night){
    ctx.fillStyle = '#fff';
    for (const s of STAR_FIELD){
      const [sx,sy] = toScreen(s.x, s.y);
      ctx.globalAlpha = 0.3 + 0.7*Math.abs(Math.sin(t/2000 + s.b*10));
      ctx.fillRect(sx, sy, 1.5, 1.5);
    }
    ctx.globalAlpha = 1;
  }

  // Države
  for (const code in COUNTRIES){
    const c = COUNTRIES[code];
    const unl = S.unlocked.has(code);
    ctx.beginPath();
    c.poly.forEach((p,i) => {
      const [x,y] = toScreen(p[0], p[1]);
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.closePath();
    ctx.fillStyle = unl ? c.color : '#0a121e';
    ctx.fill();
    ctx.strokeStyle = unl ? '#2a4866' : '#0e1a2b';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Naziv države
    if (unl && S.view.scale > 0.3){
      const cx = c.poly.reduce((s,p)=>s+p[0],0)/c.poly.length;
      const cy = c.poly.reduce((s,p)=>s+p[1],0)/c.poly.length;
      const [sx,sy] = toScreen(cx,cy);
      ctx.fillStyle = '#94a3b8';
      ctx.font = `${Math.max(9, 10*S.view.scale)}px Inter`;
      ctx.textAlign = 'center';
      ctx.fillText(c.name.split(' ').slice(-1)[0].toUpperCase(), sx, sy);
    }
  }

  // Vremenski efekti
  drawWeather(t);

  // Dalekovodi
  for (const [a,b] of LINES){
    const A = PLACES_BY_ID[a], B = PLACES_BY_ID[b];
    if (!A || !B) continue;
    if (!S.unlocked.has(A.country) || !S.unlocked.has(B.country)) continue;
    const [ax,ay] = toScreen(A.x, A.y);
    const [bx,by] = toScreen(B.x, B.y);
    const broken = S.brokenIds.has(lineKey(a,b)) || S.brokenIds.has(a) || S.brokenIds.has(b);

    // Sjena/baza
    ctx.strokeStyle = broken ? '#3a1818' : '#0e2438';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(ax,ay); ctx.lineTo(bx,by);
    ctx.stroke();

    // Glow linija ako radi
    if (!broken){
      ctx.strokeStyle = '#22d3ee';
      ctx.lineWidth = 1.2;
      ctx.shadowColor = '#22d3ee';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(ax,ay); ctx.lineTo(bx,by);
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Čestice
      const dx = bx - ax, dy = by - ay;
      const len = Math.sqrt(dx*dx+dy*dy);
      const speed = 0.00015 * len;
      const phase = (t * speed) % 1;
      for (let k=0;k<3;k++){
        const tt = (phase + k/3) % 1;
        const px = ax + dx*tt;
        const py = ay + dy*tt;
        ctx.fillStyle = '#7df9ff';
        ctx.shadowColor = '#22d3ee';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(px,py,2,0,Math.PI*2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    } else {
      // Iskričavi efekat na pokvarenoj liniji
      if (Math.random() < 0.3){
        const tt = Math.random();
        const px = ax + (bx-ax)*tt;
        const py = ay + (by-ay)*tt;
        ctx.fillStyle = '#ef4444';
        ctx.shadowColor = '#ef4444';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(px,py,3,0,Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
  }

  // Mjesta (elektrane, trafostanice, gradovi)
  for (const p of PLACES){
    if (!S.unlocked.has(p.country)) continue;
    drawPlace(p, t);
  }

  // Dodatne izgrađene elektrane
  for (const p of S.builtPlants){
    drawPlace(p, t);
  }

  // Hover info
  if (S.hover){
    const [sx,sy] = toScreen(S.hover.x, S.hover.y);
    ctx.fillStyle = '#0e1828ee';
    ctx.strokeStyle = '#22d3ee';
    ctx.lineWidth = 1;
    const txt = S.hover.name;
    ctx.font = '12px Inter';
    const w = ctx.measureText(txt).width + 16;
    ctx.fillRect(sx+12, sy-12, w, 22);
    ctx.strokeRect(sx+12, sy-12, w, 22);
    ctx.fillStyle = '#e2e8f0';
    ctx.textAlign = 'left';
    ctx.fillText(txt, sx+20, sy+3);
  }

  // Kvarovi: ikonica iznad lokacije
  for (const f of S.faults){
    const p = PLACES_BY_ID[f.placeId] || S.builtPlants.find(x=>x.id===f.placeId);
    if (!p) continue;
    const [sx,sy] = toScreen(p.x, p.y);
    const bob = Math.sin(t/300)*3;
    ctx.font = '24px serif';
    ctx.textAlign = 'center';
    ctx.fillText(f.type.ic, sx, sy - 22 + bob);
    // Krug upozorenja
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 2;
    const r = 18 + Math.sin(t/250)*3;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI*2);
    ctx.stroke();
  }
}

function drawPlace(p, t){
  const [sx,sy] = toScreen(p.x, p.y);
  const broken = S.brokenIds.has(p.id);

  if (p.kind === 'city'){
    const r = p.size === 'lg' ? 6 : p.size === 'md' ? 4.5 : 3;
    // Halo
    ctx.fillStyle = broken ? '#3a1818' : '#0a1a2a';
    ctx.beginPath();
    ctx.arc(sx, sy, r*1.8, 0, Math.PI*2);
    ctx.fill();
    // Tijelo
    ctx.fillStyle = broken ? '#ef4444' : (isNight() ? '#fde68a' : '#facc15');
    ctx.shadowColor = broken ? '#ef4444' : '#fde68a';
    ctx.shadowBlur = isNight() && !broken ? 12 : 4;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // Naziv
    if (S.view.scale > 0.5 || p.size === 'lg'){
      ctx.fillStyle = '#cbd5e1';
      ctx.font = `${p.size==='lg'?12:10}px Inter`;
      ctx.textAlign = 'left';
      ctx.fillText(p.name, sx + r + 4, sy + 3);
    }
  } else if (p.kind === 'plant'){
    const def = PLANT_TYPES[p.ptype];
    ctx.font = '20px serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = broken ? '#7f1d1d' : '#0a1a2a';
    ctx.beginPath();
    ctx.arc(sx, sy, 14, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = broken ? '#ef4444' : '#22d3ee';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillText(def.ic, sx, sy + 7);
  } else if (p.kind === 'sub'){
    // Trafostanica: kvadrat
    const sz = 8;
    ctx.fillStyle = broken ? '#7f1d1d' : '#0a1a2a';
    ctx.fillRect(sx-sz, sy-sz, sz*2, sz*2);
    ctx.strokeStyle = broken ? '#ef4444' : '#22d3ee';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(sx-sz, sy-sz, sz*2, sz*2);
    // Mali križ
    ctx.fillStyle = '#22d3ee';
    ctx.font = '10px Inter';
    ctx.fillText('⚡', sx, sy + 3);
  }
}

/* ====================================================
   VREMENSKI EFEKTI – overlay
   ==================================================== */
const rainDrops = [];
const snowFlakes = [];
function ensureRain(){
  while (rainDrops.length < 200) rainDrops.push({ x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight, v: 4+Math.random()*4 });
}
function ensureSnow(){
  while (snowFlakes.length < 100) snowFlakes.push({ x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight, v: 1+Math.random(), d: Math.random()*Math.PI*2 });
}
function drawWeather(t){
  const w = S.weather;
  if (w === 'rain' || w === 'storm'){
    ensureRain();
    ctx.strokeStyle = w === 'storm' ? '#7df9ff66' : '#7df9ff44';
    ctx.lineWidth = 1;
    for (const d of rainDrops){
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - 2, d.y + 10);
      ctx.stroke();
      d.y += d.v * (w==='storm' ? 2 : 1);
      d.x -= 0.5;
      if (d.y > window.innerHeight){ d.y = -10; d.x = Math.random()*window.innerWidth; }
    }
    if (w === 'storm' && Math.random() < 0.004){
      // Munja
      ctx.fillStyle = '#fff';
      ctx.fillRect(0,0,W(),H());
    }
  } else if (w === 'snow'){
    ensureSnow();
    ctx.fillStyle = '#ffffff88';
    for (const s of snowFlakes){
      ctx.beginPath();
      ctx.arc(s.x, s.y, 1.5, 0, Math.PI*2);
      ctx.fill();
      s.y += s.v;
      s.x += Math.sin(t/1000 + s.d)*0.5;
      if (s.y > window.innerHeight){ s.y = -5; s.x = Math.random()*window.innerWidth; }
    }
  } else if (w === 'heat'){
    // Toplotni val: zlatni overlay
    ctx.fillStyle = '#fb923c10';
    ctx.fillRect(0,0,W(),H());
  } else if (w === 'cloudy'){
    ctx.fillStyle = '#0e182833';
    ctx.fillRect(0,0,W(),H());
  }
}

/* ====================================================
   INPUT
   ==================================================== */
map.addEventListener('mousemove', e => {
  const r = map.getBoundingClientRect();
  const px = e.clientX - r.left, py = e.clientY - r.top;
  S.hover = findPlaceAt(px, py);
  map.style.cursor = S.hover ? 'pointer' : 'crosshair';
});
map.addEventListener('mouseleave', () => { S.hover = null; });
map.addEventListener('click', e => {
  const r = map.getBoundingClientRect();
  const px = e.clientX - r.left, py = e.clientY - r.top;
  const p = findPlaceAt(px, py);
  if (p){
    const f = S.faults.find(x => x.placeId === p.id);
    if (f) openFaultTask(f);
    else showPlaceInfo(p);
  } else {
    // Možda kliknu na fault iznad mjesta
    for (const f of S.faults){
      const pp = PLACES_BY_ID[f.placeId];
      if (!pp) continue;
      const [sx,sy] = toScreen(pp.x, pp.y);
      const dx = px-sx, dy = py-(sy-22);
      if (dx*dx+dy*dy < 25*25){ openFaultTask(f); break; }
    }
  }
});
map.addEventListener('touchstart', e => {
  if (e.touches.length === 1){
    const r = map.getBoundingClientRect();
    const px = e.touches[0].clientX - r.left, py = e.touches[0].clientY - r.top;
    const p = findPlaceAt(px, py);
    if (p){
      const f = S.faults.find(x => x.placeId === p.id);
      if (f){ openFaultTask(f); e.preventDefault(); }
      else { showPlaceInfo(p); e.preventDefault(); }
    } else {
      for (const f of S.faults){
        const pp = PLACES_BY_ID[f.placeId];
        if (!pp) continue;
        const [sx,sy] = toScreen(pp.x, pp.y);
        const dx = px-sx, dy = py-(sy-22);
        if (dx*dx+dy*dy < 25*25){ openFaultTask(f); e.preventDefault(); break; }
      }
    }
  }
}, { passive: false });

function findPlaceAt(px, py){
  for (const p of PLACES){
    if (!S.unlocked.has(p.country)) continue;
    const [sx,sy] = toScreen(p.x, p.y);
    const dx = px-sx, dy = py-sy;
    if (dx*dx+dy*dy < 16*16) return p;
  }
  for (const p of S.builtPlants){
    const [sx,sy] = toScreen(p.x, p.y);
    const dx = px-sx, dy = py-sy;
    if (dx*dx+dy*dy < 16*16) return p;
  }
  return null;
}

const overlay = document.getElementById('overlay');
const modalEl = document.getElementById('modal');
function showModal(){ overlay.classList.add('show'); }
function closeModal(){ overlay.classList.remove('show'); modalEl.innerHTML = ''; }
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

function showPlaceInfo(p){
  let body = '';
  if (p.kind === 'city'){
    body = `<div class="desc">Potrošač · ${p.size==='lg'?'Veliki':p.size==='md'?'Srednji':'Mali'} · Potražnja: <b>${p.demand} MW</b><br>Zemlja: ${COUNTRIES[p.country].name}</div>`;
  } else if (p.kind === 'plant'){
    const def = PLANT_TYPES[p.ptype];

  } else if (p.kind === 'sub'){
    body = `<div class="desc">Trafostanica · Raspodjeljuje energiju potrošačima.<br>Zemlja: ${COUNTRIES[p.country].name}</div>`;
  }

/* ====================================================
   MINI-ZADACI ZA KVAROVE
   ==================================================== */
function openFaultTask(idOrObj){
  const f = (typeof idOrObj === 'object') ? idOrObj : S.faults.find(x => x.id === idOrObj);
  if (!f) return;
  const place = PLACES_BY_ID[f.placeId] || S.builtPlants.find(x=>x.id===f.placeId);
  const timeLeft = Math.max(0, f.deadline - S.time);
  modalEl.innerHTML = `
    <h2>${f.type.ic} ${f.type.name} <span class="badge-lvl">LV ${f.severity}</span></h2>
    <div class="desc">📍 <b>${place.name}</b> · ${COUNTRIES[place.country].name}<br>
      Pogođeno: <b>${f.affected}</b> potrošača · Rok: <b>${Math.round(timeLeft)} min</b></div>
    <div class="reward">
      <span>💰 +${f.reward.money}</span>
      <span>⚡ +${f.reward.xp} XP</span>
      <span>👥 +${f.reward.rep}</span>
    </div>
    <div id="taskArea" class="taskArea"></div>
    <div class="actions">
      <button class="btn" onclick="closeModal()">Odgodi</button>
      <button class="btn danger" onclick="bypassFault(${f.id})">Plati popravku (-${f.reward.money*2}$)</button>
    </div>`;
  showModal();
  renderTask(f);
}

function bypassFault(id){
  const f = S.faults.find(x => x.id === id);
  if (!f) return;
  const cost = f.reward.money * 2;
  if (S.money < cost){ toast('Nemaš dovoljno novca', 'bad'); return; }
  S.money -= cost;
  S.reputation = Math.max(0, S.reputation - 2);
  addLog(`💸 Plaćena vanjska popravka: ${f.type.name}`, 'warn');
  removeFault(id);
  closeModal();
  updateHud();
}

function renderTask(f){
  const area = document.getElementById('taskArea');
  if (f.type.task === 'wire')      renderWireTask(area, f);
  else if (f.type.task === 'options') renderOptionsTask(area, f);
  else if (f.type.task === 'calc')    renderCalcTask(area, f);
  else if (f.type.task === 'timing')  renderTimingTask(area, f);
  else if (f.type.task === 'cyber')   renderCyberTask(area, f);
}

// 1) Spoji prekinuti vod (klikni dugmiće u tačnom redoslijedu)
function renderWireTask(area, f){
  const n = 4 + Math.min(4, f.severity);
  const seq = [];
  while (seq.length < n) {
    const v = randInt(1, n);
    if (!seq.includes(v)) seq.push(v);
  }
  const correctOrder = [...seq].sort((a,b)=>a-b);
  const state = [];
  area.innerHTML = `
    <p style="margin-bottom:10px;font-size:13px;color:var(--muted)">
      🔌 Spoji prekinuti dalekovod klikom na čvorove redom <b>od 1 do ${n}</b>.</p>
    <div class="wireRow" id="wireRow"></div>
    <p style="margin-top:14px;font-size:12px;color:var(--muted);text-align:center" id="wireStatus">Klikni 1</p>`;
  const row = document.getElementById('wireRow');
  // Pomiješani redoslijed prikaza
  const shown = [...seq].sort(() => Math.random()-0.5);
  shown.forEach(v => {
    const b = document.createElement('button');
    b.className = 'wireBtn';
    b.textContent = v;
    b.onclick = () => {
      const expect = correctOrder[state.length];
      if (v === expect){
        b.classList.add('on');
        b.disabled = true;
        state.push(v);
        if (state.length === correctOrder.length){
          completeFault(f);
        } else {
          document.getElementById('wireStatus').textContent = `Klikni ${correctOrder[state.length]}`;
        }
      } else {
        b.classList.add('wrong');
        setTimeout(() => b.classList.remove('wrong'), 300);
      }
    };
    row.appendChild(b);
  });
}

// 2) Izbor između opcija
function renderOptionsTask(area, f){
  const correct = randInt(0,3);
  const options = [
    'Zamijeni glavni transformator T1 (110/35 kV)',
    'Aktiviraj rezervnu liniju D2 i prebaci opterećenje',
    'Pošalji ekipu za remont nakon završetka smjene',
    'Izvrši kratak test izolacije na svim sabirnicama',
    'Provjeri SCADA log za posljednjih 60 minuta',
    'Pošalji nalog za hitnu intervenciju dispečeru',
    'Smanji proizvodnju na najbližoj elektrani',
    'Aktiviraj automatsko prebacivanje na rezervu',
  ];
  // Random 4 opcije, jedna označena kao tačna
  const picked = [];
  while (picked.length < 4){
    const o = pick(options);
    if (!picked.includes(o)) picked.push(o);
  }
  area.innerHTML = `
    <p style="margin-bottom:12px;font-size:13px;color:var(--muted)">
      🛠️ Odaberi <b>optimalnu</b> intervenciju za ovaj kvar:</p>
    <div class="options" id="optsGrid"></div>
    <p style="margin-top:12px;font-size:11px;color:var(--muted);text-align:center">
      Razmisli — pogrešan odabir košta sigurnost mreže.</p>`;
  const g = document.getElementById('optsGrid');
  picked.forEach((opt, i) => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.textContent = opt;
    b.onclick = () => {
      // Heuristika: prva opcija je "ispravna"
      if (i === correct){
        b.classList.add('picked');
        b.style.borderColor = 'var(--good)';
        b.style.background = '#0a2a1a';
        completeFault(f);
      } else {
        S.security = Math.max(0, S.security - 3);
        b.style.borderColor = 'var(--bad)';
        b.style.background = '#3a1a1a';
        setTimeout(() => failFault(f, 'Pogrešna intervencija'), 600);
      }
    };
    g.appendChild(b);
  });
}

// 3) Izračun nedostatka energije
function renderCalcTask(area, f){
  const a = randInt(100, 400);
  const b = randInt(80, 250);
  const c = randInt(50, 200);
  const proizvodnja = a + b;
  const potrosnja = a + b + c;
  const ans = potrosnja - proizvodnja;
  area.innerHTML = `
    <p style="margin-bottom:12px;font-size:13px;color:var(--muted)">
      📊 Izračunaj koliko energije <b>nedostaje</b> mreži (u MW):</p>
    <div class="calcDisplay">
      Proizvodnja: ${a} + ${b} = <b>${proizvodnja} MW</b><br>
      Potrošnja: ${potrosnja} MW
    </div>
    <input type="number" class="numInput" id="calcInput" placeholder="MW" autofocus>
    <div class="actions" style="justify-content:center">
      <button class="btn primary" onclick="checkCalc(${f.id}, ${ans})">Potvrdi</button>
    </div>`;
  setTimeout(() => document.getElementById('calcInput')?.focus(), 100);
}
function checkCalc(fid, ans){
  const f = S.faults.find(x => x.id === fid);
  if (!f) return;
  const v = parseInt(document.getElementById('calcInput').value, 10);
  if (v === ans) completeFault(f);
  else {
    S.security = Math.max(0, S.security - 2);
    failFault(f, `Pogrešno. Tačan odgovor: ${ans} MW`);
  }
}

// 4) Timing – stabilizacija frekvencije
function renderTimingTask(area, f){
  area.innerHTML = `
    <p style="margin-bottom:12px;font-size:13px;color:var(--muted)">
      ⚡ Stabilizuj frekvenciju mreže: klikni kad je marker u <b>zelenoj zoni</b>.</p>
    <div class="timingBar"><div class="timingMarker" id="timingMarker"></div></div>
    <div class="actions" style="justify-content:center;margin-top:14px">
      <button class="btn primary" id="timingBtn">Aktiviraj zaštitu</button>
    </div>
    <p style="text-align:center;margin-top:6px;font-size:11px;color:var(--muted)" id="timingTries">Pokušaj: 1/3</p>`;
  let tries = 0, hits = 0;
  document.getElementById('timingBtn').onclick = () => {
    tries++;
    const m = document.getElementById('timingMarker');
    const r = m.getBoundingClientRect();
    const parent = m.parentElement.getBoundingClientRect();
    const pct = (r.left - parent.left) / (parent.width - r.width);
    // Zelena zona je 30%–60%
    if (pct >= 0.30 && pct <= 0.60){
      hits++;
      toast('Pogodak ✓', 'good');
    } else {
      toast('Promašaj', 'bad');
    }
    if (hits >= 2){ completeFault(f); return; }
    if (tries >= 3){ failFault(f, 'Premalo pogodaka — frekvencija nestabilna'); return; }
    document.getElementById('timingTries').textContent = `Pokušaj: ${tries+1}/3 · Pogoci: ${hits}/2`;
  };
}

// 5) Cyber napad – sekvenca šifri
function renderCyberTask(area, f){
  const code = Array.from({length:5}, () => randInt(0,9)).join('');
  area.innerHTML = `
    <p style="margin-bottom:10px;font-size:13px;color:var(--muted)">
      💻 Otkrij šifru napadača i unesi je. Sistem ti je dao <b>tri tragova</b>:</p>
    <div style="background:var(--grid);padding:12px;border-radius:8px;font-family:monospace;font-size:13px;line-height:1.7">
      Suma cifara: <b style="color:var(--live-2)">${code.split('').reduce((a,b)=>a+(+b),0)}</b><br>
      Prva cifra: <b style="color:var(--live-2)">${code[0]}</b><br>
      Zadnje 2 cifre (kao broj): <b style="color:var(--live-2)">${code.slice(3)}</b>
    </div>
    <input type="text" class="numInput" id="cyberInput" placeholder="5-cifren kod" maxlength="5" style="margin-top:12px">
    <div class="actions" style="justify-content:center">
      <button class="btn primary" onclick="checkCyber(${f.id}, '${code}')">Potvrdi</button>
    </div>`;
  setTimeout(() => document.getElementById('cyberInput')?.focus(), 100);
}
function checkCyber(fid, code){
  const f = S.faults.find(x => x.id === fid);
  if (!f) return;
  const v = document.getElementById('cyberInput').value;
  if (v === code) completeFault(f);
  else {
    S.security = Math.max(0, S.security - 5);
    failFault(f, `Pogrešna šifra: ${code}`);
  }
}

function completeFault(f){
  S.money += f.reward.money;
  S.xp += f.reward.xp;
  S.reputation = Math.min(100, S.reputation + f.reward.rep);
  S.security = Math.min(100, S.security + 1);
  S.taskCount++;
  removeFault(f.id);
  addLog(`✓ Riješeno: ${f.type.name} · +${f.reward.money}$ +${f.reward.xp}XP`, 'good');
  toast(`✓ +${f.reward.money}$  +${f.reward.xp} XP`, 'good');
  closeModal();
  updateHud();
  checkLevelUp();
}

function failFault(f, reason){
  S.security = Math.max(0, S.security - 3);
  addLog(`✗ Pokušaj neuspješan: ${reason}`, 'bad');
  toast(reason, 'bad');
  // Ne uklanjamo kvar — i dalje vrijedi do deadlinea
  closeModal();
  updateHud();
}

function openFaults(){
  if (!S.faults.length){
    modalEl.innerHTML = `<h2>⚠️ Aktivni kvarovi</h2>
      <div class="desc">Trenutno nema aktivnih kvarova. Mreža je stabilna. 🟢</div>
      <div class="actions"><button class="btn" onclick="closeModal()">Zatvori</button></div>`;
    showModal();
    return;
  }
  let html = `<h2>⚠️ Aktivni kvarovi (${S.faults.length})</h2>
    <div class="desc">Klikni za rješavanje. Svaki nerijeen kvar smanjuje sigurnost i reputaciju.</div>
    <div class="menu-list">`;
  for (const f of S.faults){
    const p = PLACES_BY_ID[f.placeId] || S.builtPlants.find(x=>x.id===f.placeId);
    const tl = Math.max(0, f.deadline - S.time);
    html += `<div class="menu-item" onclick="closeModal();setTimeout(()=>openFaultTask(${ftRef(f.id)}),100)">
      <div class="mi-ic">${f.type.ic}</div>
      <div class="mi-body">
        <div class="mi-name">${f.type.name}</div>
        <div class="mi-desc">📍 ${p?.name||'?'} · ⏱ ${Math.round(tl)} min · LV ${f.severity}</div>
      </div>
      <div class="mi-cost">+${f.reward.money}$</div>
    </div>`;
  }
  html += `</div><div class="actions"><button class="btn" onclick="closeModal()">Zatvori</button></div>`;
  modalEl.innerHTML = html;
  showModal();
}
function ftRef(id){ return id; }
// openFaultTask je top-level deklaracija — automatski dostupna iz onclick atributa

/* ====================================================
   PANEL: GRADNJA
   ==================================================== */
window.BUILD_TAB = 'plants';
function openBuild(){
  const tab = window.BUILD_TAB || 'plants';
  let html = `<h2>🏗️ Gradnja</h2>
    <div class="desc">Investiraj u novu infrastrukturu. Nove elektrane povećavaju kapacitet mreže.</div>
    <div class="menu-tabs">
      <button class="menu-tab ${tab==='plants'?'active':''}" onclick="window.BUILD_TAB='plants';openBuild()">Elektrane</button>
      <button class="menu-tab ${tab==='upgrade'?'active':''}" onclick="window.BUILD_TAB='upgrade';openBuild()">Nadogradnje</button>
    </div>
    <div class="menu-list">`;
  if (tab === 'plants'){
    for (const key in PLANT_TYPES){
      const t = PLANT_TYPES[key];
      const need = t.lvl || 1;
      const locked = !S.features.has(key) && key!=='thermal' && key!=='hydro';
      const canAfford = S.money >= t.cost && S.level >= need;
      html += `<div class="menu-item ${locked?'locked':''}" ${!locked && canAfford?`onclick="buildPlant('${key}')"`:''}>
        <div class="mi-ic">${t.ic}</div>
        <div class="mi-body">
          <div class="mi-name">${t.name}</div>
          <div class="mi-desc">Kapacitet: ${t.cap} MW · ${locked?`Otključava se na Lv ${need}`:''}</div>
        </div>
        <div class="mi-cost">${fmt(t.cost)}$</div>
      </div>`;
    }
  } else {
    const upgrades = [
      { name:'Pojačaj trafostanicu', desc:'+10 kapaciteta', cost:500, ic:'🔧', do:()=>{ toast('Trafostanica pojačana','good'); S.reputation = Math.min(100,S.reputation+1); } },
      { name:'Dodaj rezervni dalekovod', desc:'-20% šanse za prekid', cost:800, ic:'🔌', do:()=>{ toast('Rezervna linija postavljena','good'); } },
      { name:'Antišpijunski softver',  desc:'Cyber zaštita +10', cost:1200, ic:'🛡️', do:()=>{ toast('Sigurnost povećana','good'); S.security = Math.min(100, S.security+10); } },
      { name:'Edukacija osoblja',     desc:'Brže rješavanje kvarova', cost:600, ic:'📚', do:()=>{ toast('Tim trenirana','good'); S.reputation = Math.min(100,S.reputation+3); } },
    ];
    for (const u of upgrades){
      const can = S.money >= u.cost;
      html += `<div class="menu-item ${can?'':'locked'}" ${can?`onclick="doUpgrade(${upgrades.indexOf(u)})"`:''}>
        <div class="mi-ic">${u.ic}</div>
        <div class="mi-body">
          <div class="mi-name">${u.name}</div>
          <div class="mi-desc">${u.desc}</div>
        </div>
        <div class="mi-cost">${fmt(u.cost)}$</div>
      </div>`;
    }
    window._UPGRADES = upgrades;
  }
  html += `</div><div class="actions"><button class="btn" onclick="closeModal()">Zatvori</button></div>`;
  modalEl.innerHTML = html;
  showModal();
}
window.buildPlant = (key) => {
  const t = PLANT_TYPES[key];
  if (S.money < t.cost){ toast('Nedovoljno novca','bad'); return; }
  S.money -= t.cost;
  // Postavi u nasumičnu otključanu zemlju, na malu nasumičnu poziciju
  const countries = [...S.unlocked];
  const c = pick(countries);
  const cdef = COUNTRIES[c];
  const cx = cdef.poly.reduce((s,p)=>s+p[0],0)/cdef.poly.length + rand(-20,20);
  const cy = cdef.poly.reduce((s,p)=>s+p[1],0)/cdef.poly.length + rand(-20,20);
  const id = 'b_' + Date.now();
  const plant = { id, country:c, kind:'plant', ptype:key, name:t.name + ' ' + (S.builtPlants.length+1), x:cx, y:cy, cap:t.cap };
  S.builtPlants.push(plant);
  PLACES_BY_ID[id] = plant;
  // Spoji ga na najbližu trafostanicu/grad
  let best = null, bd = Infinity;
  for (const p of PLACES){
    if (p.country !== c || p.kind === 'plant') continue;
    const dx = p.x - cx, dy = p.y - cy;
    const d = dx*dx+dy*dy;
    if (d < bd){ bd = d; best = p; }
  }
  if (best) LINES.push([id, best.id]);
  toast(`✓ Izgrađeno: ${plant.name}`, 'good');
  addLog(`🏗️ Izgrađeno: ${plant.name} u ${cdef.name}`, 'good');
  S.xp += 30; S.reputation = Math.min(100, S.reputation+2);
  closeModal();
  updateHud();
  checkLevelUp();
};
window.doUpgrade = (idx) => {
  const u = window._UPGRADES[idx];
  if (S.money < u.cost){ toast('Nedovoljno novca','bad'); return; }
  S.money -= u.cost;
  u.do();
  closeModal();
  updateHud();
};

    const owned = S.research.has(r.id);

    html += `<div class="menu-item ${owned?'owned':(can?'':'locked')}"
      ${!owned && can?`onclick="researchTech('${r.id}', ${r.cost})"`:''}>

window.researchTech = (id, cost) => {
  if (S.money < cost){ toast('Nedovoljno novca','bad'); return; }

  addLog(`🔬 Istraženo: ${r.name}`, 'good');
  S.xp += 50;
  closeModal();
  updateHud();
  checkLevelUp();
};

/* ====================================================
   GAME LOOP
   ==================================================== */
let lastFrame = performance.now();
let gameStarted = false;
function startGame(){
  if (gameStarted) return;
  gameStarted = true;
  resize();
  updateHud();
  addLog('🟢 Sistem aktivan. Mreža pod kontrolom.', 'good');
  requestAnimationFrame(loop);
}

function loop(now){
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;

  // Vrijeme: 1 sec realnog = 0.5 minuta u igri (sporo)
  S.time += dt * 0.5;
  if (S.time > 1440) S.time -= 1440;
  document.getElementById('clock').textContent = formatTime();

  maybeChangeWeather();
  maybeGenerateFault();
  tickFaults();

  // Pasivni prihod (ako mreža radi)
  if (S.security > 30){
    S.money += dt * (1.5 + S.level*0.3) * (S.security/100);
  }
  // Sigurnost se polako oporavlja
  S.security = Math.min(100, S.security + dt * 0.5);

  draw();
  updateHud();
  requestAnimationFrame(loop);
}
